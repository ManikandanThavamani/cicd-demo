name: Python CI/CD Pipeline

# 1. TRIGER: When does this run?
on:
  push:
    branches: [ "main" ] # Runs every time code is pushed to the main branch

# 2. JOBS: What servers (runners) will do the work?
jobs:
  build-and-test:
    runs-on: ubuntu-latest # GitHub provides a free Linux server for this

    # 3. STEPS: What are the exact commands to run?
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3 # This pulls your code onto the Linux server

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Run Unit Tests
      run: |
        pytest test_app.py
# ... (keep the build-and-test job exactly as it was above)

  deploy:
    needs: build-and-test # CRITICAL: Deploy ONLY happens if tests pass!
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to Production
      run: |
        echo "Tests passed! Simulating deployment to production server..."
        echo "Copying files to server..."
        echo "Restarting application..."
        echo "Deployment Successful! 🚀"
